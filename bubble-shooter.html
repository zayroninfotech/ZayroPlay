<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bubble Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    #game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #hud {
      display: flex;
      gap: 40px;
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(255,255,255,0.4);
    }

    #hud span { color: #ffd700; }

    #canvas-container {
      position: relative;
    }

    canvas {
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(100, 80, 255, 0.5), 0 0 80px rgba(100, 80, 255, 0.2);
      display: block;
      cursor: crosshair;
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.78);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      gap: 18px;
    }

    #overlay h1 {
      font-size: 42px;
      background: linear-gradient(90deg, #ff6ec7, #ffd700, #6effd5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
      animation: pulse 1.8s infinite;
    }

    #overlay p { font-size: 16px; color: #ccc; text-align: center; max-width: 280px; line-height: 1.6; }

    #overlay button {
      margin-top: 8px;
      padding: 14px 40px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #ff6ec7, #7b2ff7);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(123,47,247,0.6);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    #overlay button:hover {
      transform: scale(1.07);
      box-shadow: 0 6px 30px rgba(123,47,247,0.9);
    }

    #result-text { font-size: 22px; font-weight: bold; color: #ffd700; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    #aim-line-hint { color: #aaa; font-size: 13px; }
  </style>
</head>
<body>

<div id="game-wrapper">
  <div id="hud">
    Score: <span id="score-val">0</span>
    &nbsp;&nbsp;|&nbsp;&nbsp;
    Level: <span id="level-val">1</span>
    &nbsp;&nbsp;|&nbsp;&nbsp;
    Shots: <span id="shots-val">30</span>
  </div>

  <div id="canvas-container">
    <canvas id="gameCanvas" width="480" height="620"></canvas>

    <div id="overlay">
      <h1>🫧 Bubble Shooter</h1>
      <p>Aim and shoot bubbles to match 3 or more of the same color. Clear the board to win!</p>
      <p id="result-text"></p>
      <button id="start-btn">▶ Start Game</button>
      <p id="aim-line-hint">Move mouse to aim · Click to shoot</p>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('start-btn');
const scoreEl = document.getElementById('score-val');
const levelEl = document.getElementById('level-val');
const shotsEl = document.getElementById('shots-val');
const resultEl = document.getElementById('result-text');

// ── Constants ──────────────────────────────────────────────────────────────
const R = 22;          // bubble radius
const COLS = 10;
const ROWS_VISIBLE = 12;
const W = canvas.width;
const H = canvas.height;
const SHOOTER_X = W / 2;
const SHOOTER_Y = H - 50;
const COLORS = ['#FF4B5C','#FF9A3C','#FFE156','#4ADE80','#38BDF8','#818CF8','#F472B6'];

// ── State ──────────────────────────────────────────────────────────────────
let grid = [];
let projectile = null;
let nextColor = null;
let score = 0;
let shots = 30;
let level = 1;
let aimAngle = -Math.PI / 2;
let gameActive = false;
let animId = null;
let particles = [];

// ── Hex grid helpers ───────────────────────────────────────────────────────
function colToX(col, row) {
  const offset = (row % 2 === 0) ? 0 : R;
  return R + col * (R * 2) + offset;
}
function rowToY(row) {
  return R + row * (R * 1.73);
}

// ── Grid setup ─────────────────────────────────────────────────────────────
function initGrid(numRows) {
  grid = [];
  for (let r = 0; r < numRows; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      grid[r][c] = randomColor();
    }
  }
}

function randomColor() {
  const palette = COLORS.slice(0, Math.min(4 + level, COLORS.length));
  return palette[Math.floor(Math.random() * palette.length)];
}

// ── Projectile ─────────────────────────────────────────────────────────────
function spawnProjectile() {
  const color = nextColor || randomColor();
  nextColor = randomColor();
  projectile = {
    x: SHOOTER_X, y: SHOOTER_Y,
    vx: 0, vy: 0,
    color,
    active: false
  };
}

function shoot() {
  if (!gameActive || (projectile && projectile.active)) return;
  if (shots <= 0) { endGame(false); return; }
  shots--;
  shotsEl.textContent = shots;
  projectile.vx = Math.cos(aimAngle) * 10;
  projectile.vy = Math.sin(aimAngle) * 10;
  projectile.active = true;
}

// ── Collision & snapping ───────────────────────────────────────────────────
function snapToGrid(x, y) {
  let bestRow = 0, bestCol = 0, bestDist = Infinity;
  const maxRow = Math.min(grid.length + 1, ROWS_VISIBLE + 2);
  for (let r = 0; r < maxRow; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r] && grid[r][c]) continue;
      const gx = colToX(c, r);
      const gy = rowToY(r);
      const d = Math.hypot(x - gx, y - gy);
      if (d < bestDist) { bestDist = d; bestRow = r; bestCol = c; }
    }
  }
  return { row: bestRow, col: bestCol };
}

function placeBubble(row, col, color) {
  while (grid.length <= row) grid.push(new Array(COLS).fill(null));
  grid[row][col] = color;
}

// ── BFS flood fill ─────────────────────────────────────────────────────────
function getCluster(row, col) {
  const color = grid[row]?.[col];
  if (!color) return [];
  const visited = new Set();
  const queue = [[row, col]];
  const result = [];
  while (queue.length) {
    const [r, c] = queue.shift();
    const key = `${r},${c}`;
    if (visited.has(key)) continue;
    visited.add(key);
    if (grid[r]?.[c] !== color) continue;
    result.push([r, c]);
    for (const [nr, nc] of neighbors(r, c)) queue.push([nr, nc]);
  }
  return result;
}

function neighbors(r, c) {
  const even = r % 2 === 0;
  return [
    [r-1, even ? c-1 : c], [r-1, even ? c : c+1],
    [r,   c-1],             [r,   c+1],
    [r+1, even ? c-1 : c], [r+1, even ? c : c+1]
  ].filter(([nr, nc]) => nr >= 0 && nc >= 0 && nc < COLS);
}

function getFloating() {
  const connected = new Set();
  for (let c = 0; c < COLS; c++) {
    if (grid[0]?.[c]) bfsConnected(0, c, connected);
  }
  const floating = [];
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] && !connected.has(`${r},${c}`)) floating.push([r, c]);
    }
  }
  return floating;
}

function bfsConnected(startR, startC, visited) {
  const queue = [[startR, startC]];
  while (queue.length) {
    const [r, c] = queue.shift();
    const key = `${r},${c}`;
    if (visited.has(key) || !grid[r]?.[c]) continue;
    visited.add(key);
    for (const [nr, nc] of neighbors(r, c)) queue.push([nr, nc]);
  }
}

// ── Particles ──────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      color,
      life: 1,
      decay: 0.03 + Math.random() * 0.03,
      size: 4 + Math.random() * 5
    });
  }
}

// ── Winning check ──────────────────────────────────────────────────────────
function isGridEmpty() {
  return grid.every(row => row.every(cell => !cell));
}

function isGameLost() {
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] && rowToY(r) + R > SHOOTER_Y - R * 2) return true;
    }
  }
  return false;
}

// ── Update ─────────────────────────────────────────────────────────────────
function update() {
  if (!gameActive) return;

  // particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.12;
    p.life -= p.decay;
    return p.life > 0;
  });

  if (!projectile || !projectile.active) return;

  projectile.x += projectile.vx;
  projectile.y += projectile.vy;

  // wall bounce
  if (projectile.x - R < 0)   { projectile.x = R; projectile.vx *= -1; }
  if (projectile.x + R > W)   { projectile.x = W - R; projectile.vx *= -1; }
  if (projectile.y - R < 0)   { projectile.y = R; projectile.vy *= -1; }

  // hit top wall
  if (projectile.y - R <= 0) {
    landBubble();
    return;
  }

  // collision with grid bubbles
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!grid[r][c]) continue;
      const gx = colToX(c, r);
      const gy = rowToY(r);
      if (Math.hypot(projectile.x - gx, projectile.y - gy) < R * 1.9) {
        landBubble();
        return;
      }
    }
  }

  // off-screen bottom
  if (projectile.y > H + R) { spawnProjectile(); }
}

function landBubble() {
  const { row, col } = snapToGrid(projectile.x, projectile.y);
  placeBubble(row, col, projectile.color);

  const cluster = getCluster(row, col);
  if (cluster.length >= 3) {
    cluster.forEach(([r, c]) => {
      spawnParticles(colToX(c, r), rowToY(r), grid[r][c]);
      grid[r][c] = null;
    });
    score += cluster.length * 10 * level;
    scoreEl.textContent = score;

    // drop floating
    const floating = getFloating();
    floating.forEach(([r, c]) => {
      spawnParticles(colToX(c, r), rowToY(r), grid[r][c], 6);
      grid[r][c] = null;
      score += 5;
    });
    scoreEl.textContent = score;
  }

  if (isGridEmpty()) {
    level++;
    levelEl.textContent = level;
    shots = Math.min(shots + 10, 40);
    shotsEl.textContent = shots;
    initGrid(5 + level);
  }

  if (isGameLost()) { endGame(false); return; }
  if (shots <= 0)   { endGame(false); return; }

  spawnProjectile();
}

// ── Draw ───────────────────────────────────────────────────────────────────
function drawBubble(x, y, color, alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;

  // glow
  const glow = ctx.createRadialGradient(x - R*0.3, y - R*0.3, R*0.1, x, y, R);
  glow.addColorStop(0, 'rgba(255,255,255,0.6)');
  glow.addColorStop(0.4, color);
  glow.addColorStop(1, shadeColor(color, -40));

  ctx.beginPath();
  ctx.arc(x, y, R - 1, 0, Math.PI * 2);
  ctx.fillStyle = glow;
  ctx.fill();

  // shine
  ctx.beginPath();
  ctx.arc(x - R*0.3, y - R*0.3, R*0.25, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fill();

  ctx.restore();
}

function shadeColor(hex, amount) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, Math.max(0, (num >> 16) + amount));
  const g = Math.min(255, Math.max(0, ((num >> 8) & 0xFF) + amount));
  const b = Math.min(255, Math.max(0, (num & 0xFF) + amount));
  return `rgb(${r},${g},${b})`;
}

function drawAimLine() {
  if (!projectile || projectile.active) return;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.setLineDash([8, 10]);
  ctx.lineWidth = 2;
  ctx.beginPath();
  let x = SHOOTER_X, y = SHOOTER_Y;
  let vx = Math.cos(aimAngle) * 10;
  let vy = Math.sin(aimAngle) * 10;
  ctx.moveTo(x, y);
  for (let i = 0; i < 30; i++) {
    x += vx; y += vy;
    if (x - R < 0 || x + R > W) { vx *= -1; x += vx; }
    if (y < 0) break;
    ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.restore();
}

function drawShooter() {
  ctx.save();
  // base
  ctx.beginPath();
  ctx.arc(SHOOTER_X, SHOOTER_Y, 24, 0, Math.PI * 2);
  const grad = ctx.createRadialGradient(SHOOTER_X, SHOOTER_Y, 4, SHOOTER_X, SHOOTER_Y, 24);
  grad.addColorStop(0, '#a78bfa');
  grad.addColorStop(1, '#4c1d95');
  ctx.fillStyle = grad;
  ctx.fill();

  // barrel
  const bx = SHOOTER_X + Math.cos(aimAngle) * 30;
  const by = SHOOTER_Y + Math.sin(aimAngle) * 30;
  ctx.strokeStyle = '#c4b5fd';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(SHOOTER_X, SHOOTER_Y);
  ctx.lineTo(bx, by);
  ctx.stroke();

  ctx.restore();
}

function drawNextBubble() {
  if (!nextColor) return;
  ctx.save();
  ctx.font = '11px Segoe UI';
  ctx.fillStyle = '#aaa';
  ctx.textAlign = 'center';
  ctx.fillText('NEXT', SHOOTER_X + 55, SHOOTER_Y + 6);
  drawBubble(SHOOTER_X + 55, SHOOTER_Y + 22, nextColor);
  ctx.restore();
}

function draw() {
  // background
  ctx.clearRect(0, 0, W, H);

  // subtle grid bg
  ctx.fillStyle = 'rgba(15,12,41,0.97)';
  ctx.fillRect(0, 0, W, H);

  // grid bubbles
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c]) drawBubble(colToX(c, r), rowToY(r), grid[r][c]);
    }
  }

  // particles
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.restore();
  });

  drawAimLine();
  drawShooter();

  if (projectile) drawBubble(projectile.x, projectile.y, projectile.color);

  drawNextBubble();

  // danger zone line
  const dangerY = SHOOTER_Y - R * 2;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,60,60,0.15)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  ctx.moveTo(0, dangerY);
  ctx.lineTo(W, dangerY);
  ctx.stroke();
  ctx.restore();
}

function loop() {
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

// ── Game lifecycle ─────────────────────────────────────────────────────────
function startGame() {
  score = 0; shots = 30; level = 1;
  scoreEl.textContent = score;
  shotsEl.textContent = shots;
  levelEl.textContent = level;
  particles = [];
  initGrid(6);
  nextColor = randomColor();
  spawnProjectile();
  overlay.style.display = 'none';
  gameActive = true;
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function endGame(won) {
  gameActive = false;
  resultEl.textContent = won
    ? `🎉 You Win! Score: ${score}`
    : `💀 Game Over! Score: ${score}`;
  startBtn.textContent = '🔄 Play Again';
  overlay.style.display = 'flex';
}

// ── Input ──────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const dx = mx - SHOOTER_X;
  const dy = my - SHOOTER_Y;
  const angle = Math.atan2(dy, dx);
  // clamp so you can't shoot downward
  aimAngle = Math.max(-Math.PI + 0.15, Math.min(-0.15, angle));
});

canvas.addEventListener('click', shoot);

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  const dx = t.clientX - rect.left - SHOOTER_X;
  const dy = t.clientY - rect.top - SHOOTER_Y;
  aimAngle = Math.max(-Math.PI + 0.15, Math.min(-0.15, Math.atan2(dy, dx)));
}, { passive: false });

canvas.addEventListener('touchend', shoot);

startBtn.addEventListener('click', startGame);
</script>
</body>
</html>
