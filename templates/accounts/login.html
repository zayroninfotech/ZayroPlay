{% extends 'base.html' %}
{% block title %}Login – ZayroPlay{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">🎮</div>
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-sub">Sign in to play with friends</p>
    {% if messages %}
      {% for msg in messages %}
        <div class="auth-error">{{ msg }}</div>
      {% endfor %}
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="auth-field">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username" required placeholder="Your username">
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" required placeholder="••••••••">
      </div>
      <button type="submit" class="auth-btn">Sign In →</button>
    </form>
    <p class="auth-link">No account? <a href="{% url 'register' %}">Register here</a></p>
  </div>
</div>
{% endblock %}
